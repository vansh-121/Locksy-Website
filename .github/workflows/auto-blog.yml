name: Auto Generate Blog Post

on:
  schedule:
    # Run weekly on Wednesdays at 2:30 AM UTC = 8:00 AM India Time (IST)
    # Changed from daily to weekly to avoid mass-production patterns (AdSense compliance)
    - cron: '30 2 * * 3'
  workflow_dispatch: # Allow manual triggering

permissions:
  contents: write

jobs:
  generate-blog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: false

      - name: Generate blog post
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Optional: add UNSPLASH_ACCESS_KEY secret for AI-matched unique cover photos.
          # Without it, the script falls back to keyword-scored images from the local pool.
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: node scripts/generate-blog.mjs

      - name: Check for changes
        id: git-check
        run: |
          git diff --exit-code || echo "changes=true" >> $GITHUB_OUTPUT

      - name: Install dependencies
        if: steps.git-check.outputs.changes == 'true'
        run: pnpm install --frozen-lockfile

      - name: Verify build
        if: steps.git-check.outputs.changes == 'true'
        run: pnpm run build

      - name: Commit and push
        if: steps.git-check.outputs.changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add lib/posts/
          git commit -m "blog: weekly blog post $(date +%Y-%m-%d)"
          git push
